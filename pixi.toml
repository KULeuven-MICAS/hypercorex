[workspace]
name = "vsax"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[activation]
scripts = ["activate.sh"]          # ← add this block

# ── Core ──────────────────────────────────────────────────────────────────────
[dependencies]
python     = ">=3.11,<3.12"
setuptools = ">=69.0"

# ── Build tools (replaces apt: autoconf, make, flex, bison, g++, ccache) ─────
autoconf   = ">=2.71"
make       = ">=4.3"
flex       = ">=2.6"           # also provides libfl (replaces libfl2, libfl-dev)
bison      = ">=3.8"
gxx        = ">=12.0"          # replaces g++
ccache     = ">=4.8"
help2man   = ">=1.49"
perl       = ">=5.32"

# ── Libraries ─────────────────────────────────────────────────────────────────
zlib       = ">=1.2"           # replaces zlib1g, zlib1g-dev
gperftools = ">=2.10"          # replaces libgoogle-perftools-dev
openjdk    = "=11"             # replaces openjdk-11-jre/jdk-headless

# ── Simulation ────────────────────────────────────────────────────────────────
verilator  = ">=5.0,<=5.016"

# ── Network/download tools ────────────────────────────────────────────────────
curl       = ">=8.0"
wget       = ">=1.21"
git        = ">=2.40"
gnupg      = ">=2.4"           # replaces gnupg2

# ── Shell & editor tools ──────────────────────────────────────────────────────
zsh        = ">=5.9"
vim        = ">=9.0"
nano       = ">=7.0"
unzip      = ">=6.0"

# ── Scientific ────────────────────────────────────────────────────────────────
numpy      = ">=1.26,<2"
matplotlib = ">=3.8"

# ── numactl is Linux-only, needs a platform-specific block ───────────────────
libnuma    = ">=2.0"           # replaces numactl (runtime library)

# ── Verilog linting ───────────────────────────────────────────────────────────
verible = ">=0.0_3667_g88d12889,<0.0_3668"

# ── PyPI dependencies ─────────────────────────────────────────────────────────
[pypi-dependencies]
cocotb       = "===1.8.1"
cocotb-test  = "===0.2.4"
pytest       = ">=7.0,<9"
pytest-xdist = ">=3.0"
mako         = ">=1.3"
jsonref      = ">=1.0"
hjson        = ">=3.0"
pre-commit   = ">=3.0"
ruff         = ">=0.4"
black        = ">=24.0"
pyright      = ">=1.1"
flake8       = ">=7.0"
tqdm         = ">=4.0"
requests     = ">=2.31"

# ── Tasks ─────────────────────────────────────────────────────────────────────
[tasks]
smoke-test = "python -c \"import cocotb, pytest, numpy, matplotlib, mako, jsonref, hjson, ruff, black, flake8, tqdm, requests; print('Environment OK')\" && verilator --version"
lib-check = "python lib/vsax.py"
model-check = "python lib/vsax_models.py"
