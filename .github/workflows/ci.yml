name: VSAX Tests
on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rtl: ${{ steps.filter.outputs.rtl }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            rtl:
              - 'rtl/**'
              - 'tests/**'
            app:
              - 'app/**'
              - 'lib/**'

  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Run smoke test
        run: pixi run smoke-test

  lib-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Run library check
        run: pixi run lib-check

  rtl-im-check:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Skip notice
        if: needs.changes.outputs.rtl == 'false'
        run: echo "No changes in rtl, skipping."

      - name: Run RTL IM check
        if: needs.changes.outputs.rtl == 'true'
        run: pixi run rtl-im-check

  rtl-common-check:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Skip notice
        if: needs.changes.outputs.rtl == 'false'
        run: echo "No changes in rtl, skipping."

      - name: Run RTL Common check
        if: needs.changes.outputs.rtl == 'true'
        run: pixi run rtl-common-check

  rtl-encoder-check:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Skip notice
        if: needs.changes.outputs.rtl == 'false'
        run: echo "No changes in rtl, skipping."

      - name: Run RTL Encoder check
        if: needs.changes.outputs.rtl == 'true'
        run: pixi run rtl-encoder-check

  rtl-assocmem-check:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Skip notice
        if: needs.changes.outputs.rtl == 'false'
        run: echo "No changes in rtl, skipping."

      - name: Run RTL Associative Memory check
        if: needs.changes.outputs.rtl == 'true'
        run: pixi run rtl-assocmem-check

  app-test:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Skip notice
        if: needs.changes.outputs.app == 'false'
        run: echo "No changes in app/ or lib/, skipping."

      - name: Run tests in parallel
        if: needs.changes.outputs.app == 'true'
        run: |
          TASKS=(
            app-test-vsax-digit-recog
            app-test-vsax-bin-digit-recog
          )
          PIDS=()
          mkdir -p logs

          for TASK in "${TASKS[@]}"; do
            pixi run $TASK > logs/$TASK.log 2>&1 &
            PIDS+=($!)
          done

          FAILED=0
          for PID in "${PIDS[@]}"; do
            wait $PID || FAILED=1
          done

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: Print logs
        if: always() && needs.changes.outputs.app == 'true'
        run: |
          for LOG in logs/*.log; do
            echo "=== $LOG ==="
            cat "$LOG"
          done
